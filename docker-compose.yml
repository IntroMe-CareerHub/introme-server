version: "3.9"
services:
  mysql:
    container_name: intromeDB
    image: mysql
    restart: always
    volumes:
      - mysql_volume:/data/mysql
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_DATABASE=${DATABASE_NAME}
      - MYSQL_USER=${DATABASE_USERNAME}
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "3306:3306"
    networks:
      - introme-net
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
  server:
    container_name: introme_server
    ports:
      - "8080:8080"
    image: hyebinnn/introme_server:1.0
    volumes:
      - introme_images:/app/introme/images
    networks:
      - introme-net
    depends_on:                        # 다른 컨테이너에 의존적으로 실행
      mysql:
        condition: service_healthy     # intromeDB 컨테이너가 healthy 상태일때만 실행
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://intrmomeDB:3306/introme
networks:
  introme-net:
    driver: bridge
volumes:
  mysql_volume:
    driver: local
  introme_images:
    driver: local